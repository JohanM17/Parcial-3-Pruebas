version: '3.8'

services:

  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ticketfast_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d ticketfast_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-test:
    build: .
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://test_user:test_password@db-test:5432/ticketfast_test
    depends_on:
      db-test:
        condition: service_healthy
    command: uvicorn src.reservas.api:app --host 0.0.0.0 --port 8000
